name: Arch Package Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing vX.Y.Z tag to publish"
        required: true

permissions:
  contents: read

concurrency:
  group: arch-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      publish_pages: ${{ steps.release-kind.outputs.publish_pages }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0
          submodules: recursive
      - name: Validate release tag
        run: |
          set -euo pipefail
          case "$RELEASE_TAG" in
            v*.*.*) ;;
            *)
              echo "Release publisher only accepts vX.Y.Z tags, got $RELEASE_TAG" >&2
              exit 2
              ;;
          esac
          git rev-parse -q --verify "refs/tags/$RELEASE_TAG" >/dev/null
      - name: Classify release tag
        id: release-kind
        run: |
          set -euo pipefail
          if [[ "$RELEASE_TAG" =~ ^v[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "publish_pages=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_pages=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run local harness
        run: scripts/check-local.sh

  build-repo:
    runs-on: ubuntu-latest
    needs: [validate, build-mangoapp]
    container:
      image: archlinux:base-devel
    env:
      ARCH_REPO_GPG_PRIVATE_KEY: ${{ secrets.ARCH_REPO_GPG_PRIVATE_KEY }}
      ARCH_REPO_GPG_PASSPHRASE: ${{ secrets.ARCH_REPO_GPG_PASSPHRASE }}
      ARCH_REPO_GPG_KEY_ID: ${{ secrets.ARCH_REPO_GPG_KEY_ID }}
      GNUPGHOME: /home/builder/.gnupg
      GPGKEY: ${{ secrets.ARCH_REPO_GPG_KEY_ID }}
      KEY_OUT: ${{ github.workspace }}/.cache/arch-release/public/rivoreo-steamos/key
      PUBLISH_PAGES: ${{ needs.validate.outputs.publish_pages }}
    steps:
      - name: Install checkout dependencies
        run: |
          set -euo pipefail
          pacman -Syu --noconfirm
          pacman -S --noconfirm git
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0
          submodules: recursive
      - name: Download patched mangoapp binary
        uses: actions/download-artifact@v4
        with:
          name: mangoapp-binary
          path: .cache/arch-release/mangoapp
      - name: Restore patched mangoapp executable bit
        run: chmod 0755 .cache/arch-release/mangoapp/mangoapp
      - name: Install Arch build dependencies
        run: |
          set -euo pipefail
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            git gzip gnupg pacman-contrib python python-build python-installer \
            python-setuptools python-wheel python-dbus-next python-pytest sudo
          useradd -m builder
          printf 'builder ALL=(ALL) NOPASSWD: ALL\n' > /etc/sudoers.d/builder
          chmod 0440 /etc/sudoers.d/builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
      - name: Import signing key
        run: |
          set -euo pipefail
          install -d -m 0700 -o builder -g builder "$GNUPGHOME"
          printf 'pinentry-mode loopback\nbatch\n' > "$GNUPGHOME/gpg.conf"
          printf 'allow-loopback-pinentry\n' > "$GNUPGHOME/gpg-agent.conf"
          chown builder:builder "$GNUPGHOME/gpg.conf" "$GNUPGHOME/gpg-agent.conf"
          key_file=/home/builder/release-key.asc
          passphrase_file=/home/builder/release-key.passphrase
          : > "$passphrase_file"
          chown builder:builder "$passphrase_file"
          chmod 0600 "$passphrase_file"

          if [ -n "$ARCH_REPO_GPG_PRIVATE_KEY" ] && [ -n "$ARCH_REPO_GPG_KEY_ID" ]; then
            test -n "$ARCH_REPO_GPG_PASSPHRASE"
            printf '%s' "$ARCH_REPO_GPG_PRIVATE_KEY" > "$key_file"
            printf '%s' "$ARCH_REPO_GPG_PASSPHRASE" > "$passphrase_file"
            chown builder:builder "$key_file" "$passphrase_file"
            chmod 0600 "$key_file" "$passphrase_file"
            su builder -c "gpg --batch --import '$key_file'"
            imported="$(
              su builder -c "gpg --batch --with-colons --fingerprint '$ARCH_REPO_GPG_KEY_ID'" \
                | awk -F: '$1 == "fpr" {print $10; exit}'
            )"
            if [ "$imported" != "$ARCH_REPO_GPG_KEY_ID" ]; then
              echo "Imported signing key fingerprint does not match ARCH_REPO_GPG_KEY_ID" >&2
              exit 2
            fi
          else
            if [ "$PUBLISH_PAGES" = "true" ]; then
              echo "Missing Arch release signing secrets for stable Pages deployment" >&2
              exit 2
            fi

            su builder -c "gpg --batch --pinentry-mode loopback --passphrase '' --quick-generate-key 'Rivoreo candidate signing key <candidate@rivoreo.invalid>' rsa3072 sign 1d"
            imported="$(
              su builder -c "gpg --batch --with-colons --list-secret-keys" \
                | awk -F: '$1 == "fpr" {print $10; exit}'
            )"
            if [ -z "$imported" ]; then
              echo "Candidate signing key generation failed" >&2
              exit 2
            fi
            ARCH_REPO_GPG_KEY_ID="$imported"
            GPGKEY="$imported"
            echo "ARCH_REPO_GPG_KEY_ID=$imported" >> "$GITHUB_ENV"
            echo "GPGKEY=$imported" >> "$GITHUB_ENV"
          fi

          su builder -c "printf release-check | gpg --batch --yes --pinentry-mode loopback --passphrase-file '$passphrase_file' --local-user '$ARCH_REPO_GPG_KEY_ID' --detach-sign --output /tmp/release-check.sig"
          rm -f "$key_file" "$passphrase_file"
      - name: Build signed pacman repository
        run: |
          set -euo pipefail
          su builder -c "cd '$GITHUB_WORKSPACE' && RELEASE_TAG='$RELEASE_TAG' ARCH_REPO_GPG_KEY_ID='$ARCH_REPO_GPG_KEY_ID' GPGKEY='$ARCH_REPO_GPG_KEY_ID' KEY_OUT='$KEY_OUT' MANGOAPP_BINARY='$GITHUB_WORKSPACE/.cache/arch-release/mangoapp/mangoapp' scripts/build-arch-release-repo.sh"
      - name: Upload signed repository artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-pacman-repository
          path: .cache/arch-release/public
          if-no-files-found: error

  verify-repo-artifact:
    runs-on: ubuntu-latest
    needs: build-repo
    container:
      image: archlinux:base-devel
    steps:
      - name: Download signed repository artifact
        uses: actions/download-artifact@v4
        with:
          name: signed-pacman-repository
          path: release-repository
      - name: Install artifact verification tools
        run: |
          set -euo pipefail
          pacman -Syu --noconfirm
          pacman -S --noconfirm gnupg
      - name: Verify signed pacman repository artifact
        run: |
          set -euo pipefail

          repo="$GITHUB_WORKSPACE/release-repository/rivoreo-steamos/os/x86_64"
          key_dir="$GITHUB_WORKSPACE/release-repository/rivoreo-steamos/key"
          key="$key_dir/rivoreo.gpg"
          fingerprint_file="$key_dir/fingerprint.txt"

          pkgver="${RELEASE_TAG#v}"
          pkgver="${pkgver%%-*}"
          main_pkg="$repo/steamos-intel-handheld-${pkgver}-1-any.pkg.tar.zst"
          mango_pkg="$repo/steamos-intel-handheld-mangoapp-${pkgver}-1-x86_64.pkg.tar.zst"
          mango_debug_pkg="$repo/steamos-intel-handheld-mangoapp-debug-${pkgver}-1-x86_64.pkg.tar.zst"

          shopt -s nullglob
          keyring_pkgs=("$repo"/rivoreo-keyring-*-any.pkg.tar.zst)
          repo_config_pkgs=("$repo"/rivoreo-steamos-repo-*-any.pkg.tar.zst)
          test "${#keyring_pkgs[@]}" -eq 1
          test "${#repo_config_pkgs[@]}" -eq 1
          keyring_pkg="${keyring_pkgs[0]}"
          repo_config_pkg="${repo_config_pkgs[0]}"

          test -s "$key"
          test -s "$fingerprint_file"
          test -s "$repo/rivoreo-steamos.db"
          test -s "$repo/rivoreo-steamos.db.sig"
          test -s "$repo/rivoreo-steamos.db.tar.zst"
          test -s "$repo/rivoreo-steamos.db.tar.zst.sig"
          test -s "$repo/rivoreo-steamos.files"
          test -s "$repo/rivoreo-steamos.files.sig"
          test -s "$repo/rivoreo-steamos.files.tar.zst"
          test -s "$repo/rivoreo-steamos.files.tar.zst.sig"

          test ! -L "$repo/rivoreo-steamos.db"
          test ! -L "$repo/rivoreo-steamos.db.sig"
          test ! -L "$repo/rivoreo-steamos.files"
          test ! -L "$repo/rivoreo-steamos.files.sig"
          cmp -s "$repo/rivoreo-steamos.db" "$repo/rivoreo-steamos.db.tar.zst"
          cmp -s "$repo/rivoreo-steamos.files" "$repo/rivoreo-steamos.files.tar.zst"

          packages=(
            "$main_pkg"
            "$mango_pkg"
            "$mango_debug_pkg"
            "$keyring_pkg"
            "$repo_config_pkg"
          )
          for pkg in "${packages[@]}"; do
            test -s "$pkg"
            test -s "$pkg.sig"
            tar -xOf "$pkg" .PKGINFO >/dev/null
          done

          contains() {
            tar -tf "$1" | grep -Fx "$2" >/dev/null
          }
          pkginfo_has() {
            tar -xOf "$1" .PKGINFO | grep -Fx "$2" >/dev/null
          }

          pkginfo_has "$main_pkg" "pkgname = steamos-intel-handheld"
          pkginfo_has "$main_pkg" "pkgver = ${pkgver}-1"
          pkginfo_has "$main_pkg" "arch = any"
          contains "$main_pkg" "usr/bin/steamos-intel-handheld-power-control"
          contains "$main_pkg" "usr/bin/steamos-intel-handheld-ec-control"
          contains "$main_pkg" "usr/bin/steamos-intel-handheld-restore-etc"
          contains "$main_pkg" "usr/lib/systemd/system/steamos-intel-handheld-restore.service"
          contains "$main_pkg" "usr/lib/systemd/system/steamos-intel-handheld-power-control.service"
          contains "$main_pkg" "etc/systemd/system/steamos-intel-handheld-restore.service"
          contains "$main_pkg" "etc/systemd/system/steamos-intel-handheld-power-control.service"
          contains "$main_pkg" "opt/steamos-intel-handheld/share/etc-artifacts/manifest.toml"
          contains "$main_pkg" "opt/steamos-intel-handheld/share/etc-artifacts/dbus-1/system.d/org.rivoreo.SteamOSManager.PowerControl.conf"
          contains "$main_pkg" "opt/steamos-intel-handheld/share/etc-artifacts/steamos-manager/remotes.d/99-rivoreo-power-control.toml"
          contains "$main_pkg" "opt/steamos-intel-handheld/share/etc-artifacts/systemd/system/steamos-intel-handheld-power-control.service"
          contains "$main_pkg" "opt/steamos-intel-handheld/share/etc-artifacts/NetworkManager/dispatcher.d/90-rncn-steamdeck-wg"
          contains "$main_pkg" "etc/dbus-1/system.d/org.rivoreo.SteamOSManager.PowerControl.conf"
          contains "$main_pkg" "etc/steamos-manager/remotes.d/99-rivoreo-power-control.toml"
          contains "$main_pkg" "etc/NetworkManager/dispatcher.d/90-rncn-steamdeck-wg"
          contains "$main_pkg" "opt/steamos-intel-handheld/bin/gamescope"
          contains "$main_pkg" "opt/steamos-intel-handheld/bin/steamos-intel-handheld-gamescope-display"
          contains "$main_pkg" "opt/steamos-intel-handheld/share/etc-artifacts/systemd/user/gamescope-session.service.d/20-native-panel-resolution.conf"
          contains "$main_pkg" "opt/steamos-intel-handheld/share/etc-artifacts/systemd/user/steamos-intel-handheld-gamescope-display.service"
          contains "$main_pkg" "opt/steamos-intel-handheld/share/etc-artifacts/gamescope/scripts/00-steamos-intel-handheld/displays/msi.claw-8-ai-plus.lcd.lua"
          contains "$main_pkg" "etc/systemd/user/gamescope-session.service.d/20-native-panel-resolution.conf"
          contains "$main_pkg" "etc/systemd/user/steamos-intel-handheld-gamescope-display.service"
          contains "$main_pkg" "etc/systemd/user/gamescope-session.service.wants/steamos-intel-handheld-gamescope-display.service"
          contains "$main_pkg" "etc/gamescope/scripts/00-steamos-intel-handheld/displays/msi.claw-8-ai-plus.lcd.lua"
          contains "$main_pkg" "home/deck/homebrew/plugins/steamos-intel-handheld-ec/plugin.json"
          contains "$main_pkg" "home/deck/homebrew/plugins/steamos-intel-handheld-ec/main.py"
          contains "$main_pkg" "home/deck/homebrew/plugins/steamos-intel-handheld-ec/dist/index.js"
          contains "$main_pkg" ".INSTALL"
          tar -xOf "$main_pkg" .INSTALL | grep -F "Decky Loader not detected" >/dev/null
          tar -xOf "$main_pkg" .INSTALL | grep -F "gamescope display profile and session hooks are installed" >/dev/null

          pkginfo_has "$mango_pkg" "pkgname = steamos-intel-handheld-mangoapp"
          pkginfo_has "$mango_pkg" "pkgver = ${pkgver}-1"
          pkginfo_has "$mango_pkg" "arch = x86_64"
          contains "$mango_pkg" "opt/steamos-intel-handheld/bin/mangoapp"
          contains "$mango_pkg" "etc/systemd/user/gamescope-mangoapp.service.d/10-rivoreo-mangoapp.conf"
          contains "$mango_pkg" "opt/steamos-intel-handheld/share/etc-artifacts/manifest.d/10-mangoapp.toml"
          contains "$mango_pkg" "opt/steamos-intel-handheld/share/etc-artifacts/systemd/user/gamescope-mangoapp.service.d/10-rivoreo-mangoapp.conf"
          contains "$mango_pkg" "usr/share/licenses/steamos-intel-handheld-mangoapp/MangoHud-LICENSE"

          pkginfo_has "$mango_debug_pkg" "pkgname = steamos-intel-handheld-mangoapp-debug"
          pkginfo_has "$mango_debug_pkg" "pkgver = ${pkgver}-1"
          contains "$mango_debug_pkg" "usr/lib/debug/opt/steamos-intel-handheld/bin/mangoapp.debug"

          pkginfo_has "$keyring_pkg" "pkgname = rivoreo-keyring"
          contains "$keyring_pkg" "usr/share/pacman/keyrings/rivoreo.gpg"
          contains "$keyring_pkg" "usr/share/pacman/keyrings/rivoreo-trusted"
          contains "$keyring_pkg" "usr/share/pacman/keyrings/rivoreo-revoked"

          pkginfo_has "$repo_config_pkg" "pkgname = rivoreo-steamos-repo"
          contains "$repo_config_pkg" "etc/pacman.d/rivoreo-steamos.conf"
          repo_conf="$(tar -xOf "$repo_config_pkg" etc/pacman.d/rivoreo-steamos.conf)"
          printf '%s\n' "$repo_conf" | grep -Fx "[rivoreo-steamos]" >/dev/null
          printf '%s\n' "$repo_conf" | grep -Fx "SigLevel = Required TrustedOnly" >/dev/null
          printf '%s\n' "$repo_conf" | grep -Fx 'Server = https://rivoreo.github.io/steamos-intel-handheld/rivoreo-steamos/os/$arch' >/dev/null
          if printf '%s\n' "$repo_conf" | grep -F "http://" >/dev/null; then
            echo "Repository config must not contain insecure HTTP URLs" >&2
            exit 2
          fi

          tar -tf "$repo/rivoreo-steamos.db" | grep -Fx "steamos-intel-handheld-${pkgver}-1/desc" >/dev/null
          tar -tf "$repo/rivoreo-steamos.db" | grep -Fx "steamos-intel-handheld-mangoapp-${pkgver}-1/desc" >/dev/null
          tar -tf "$repo/rivoreo-steamos.db" | grep -Fx "steamos-intel-handheld-mangoapp-debug-${pkgver}-1/desc" >/dev/null
          tar -tf "$repo/rivoreo-steamos.db" | grep -F "rivoreo-keyring-" >/dev/null
          tar -tf "$repo/rivoreo-steamos.db" | grep -F "rivoreo-steamos-repo-" >/dev/null
          tar -tf "$repo/rivoreo-steamos.files" | grep -Fx "steamos-intel-handheld-mangoapp-${pkgver}-1/files" >/dev/null

          export GNUPGHOME="$(mktemp -d)"
          chmod 0700 "$GNUPGHOME"
          gpg --batch --import "$key"
          actual_fingerprint="$(
            gpg --batch --with-colons --show-keys "$key" \
              | awk -F: '$1 == "fpr" {print $10; exit}'
          )"
          expected_fingerprint="$(cat "$fingerprint_file")"
          test "$actual_fingerprint" = "$expected_fingerprint"

          verified=0
          for sig in "$repo"/*.sig; do
            target="${sig%.sig}"
            test -s "$target"
            gpg --batch --verify "$sig" "$target"
            verified=$((verified + 1))
          done
          test "$verified" -eq 9

  build-mangoapp:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0
          submodules: recursive
      - name: Install SteamOS rootfs build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y bzip2 curl file rsync util-linux
      - name: Build patched mangoapp in SteamOS rootfs chroot
        run: |
          set -euo pipefail
          export STEAMOS_ROOTFS_DIR="$PWD/.cache/steamos-rootfs/rootfs"
          export STEAMOS_QEMU_BUILD_JOBS=3
          export STEAMOS_QEMU_MANGOAPP_ARTIFACT="$PWD/.cache/arch-release/mangoapp/mangoapp"

          scripts/steamos-qemu-build-env.sh fetch-raw
          scripts/steamos-qemu-build-env.sh prepare-rootfs
          scripts/steamos-qemu-build-env.sh build-mangoapp-rootfs
      - name: Upload patched mangoapp binary
        uses: actions/upload-artifact@v4
        with:
          name: mangoapp-binary
          path: .cache/arch-release/mangoapp/mangoapp
          if-no-files-found: error

  deploy-pages:
    runs-on: ubuntu-latest
    needs: [validate, build-repo, verify-repo-artifact]
    if: ${{ needs.validate.outputs.publish_pages == 'true' }}
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0
          submodules: recursive
      - name: Download signed repository artifact
        uses: actions/download-artifact@v4
        with:
          name: signed-pacman-repository
          path: release-repository
      - name: Assemble release Pages artifact
        run: |
          set -euo pipefail
          fingerprint="$(cat release-repository/rivoreo-steamos/key/fingerprint.txt)"
          RIVOREO_KEY_FINGERPRINT="$fingerprint" \
            REPO_TREE="$GITHUB_WORKSPACE/release-repository/rivoreo-steamos/os/x86_64" \
            KEY_DIR="$GITHUB_WORKSPACE/release-repository/rivoreo-steamos/key" \
            SITE_OUT="$GITHUB_WORKSPACE/_site" \
            scripts/assemble-arch-release-pages.sh
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
