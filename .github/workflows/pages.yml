name: Static Site Check

on:
  pull_request:
    paths:
      - ".github/workflows/pages.yml"
      - "site/**"
      - "docs/package-repository.md"
      - "docs/superpowers/specs/2026-06-24-arch-package-repository-design.md"
      - "docs/superpowers/specs/2026-06-25-arch-package-ci-publisher-design.md"
      - "docs/superpowers/plans/2026-06-24-arch-package-repository.md"
      - "docs/superpowers/plans/2026-06-25-arch-package-ci-publisher.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build static site preview
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp -R site/. _site/
          test -f _site/index.html
          test -f _site/rivoreo-steamos/bootstrap.sh
