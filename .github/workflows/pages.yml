name: Pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/pages.yml"
      - "site/**"
      - "docs/package-repository.md"
      - "docs/superpowers/specs/2026-06-24-arch-package-repository-design.md"
      - "docs/superpowers/plans/2026-06-24-arch-package-repository.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Build static repository site
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp -R site/. _site/
          test -f _site/index.html
          test -f _site/rivoreo-steamos/bootstrap.sh
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
